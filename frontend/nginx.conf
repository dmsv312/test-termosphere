server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic-auth на весь сайт (и статику, и /api). Файл .htpasswd монтируется
    # томом из ./deploy/htpasswd — в образ не пекётся, в git не попадает.
    auth_basic "ТермоСфера — ограниченный доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # API — на контейнер api (сеть docker-compose). Префикс /api/ сохраняется,
    # т.к. proxy_pass без пути: /api/core/tables → http://api:8000/api/core/tables.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: любые прочие пути отдаём index.html (клиентская навигация).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
