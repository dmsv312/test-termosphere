# ТермоСфера — инфраструктура. Фаза 4 (живой контур): postgres + api + web.
# db — источник данных (том сохраняется); api — FastAPI; web — nginx со статикой React,
# он же проксирует /api на api. Наружу публикуется только web (за него цепляем туннель).
services:
  db:
    image: postgres:16-alpine
    container_name: termosphere_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-termosphere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-termosphere}
      POSTGRES_DB: ${POSTGRES_DB:-termosphere}
    ports:
      # ТОЛЬКО 127.0.0.1: БД доступна локальным инструментам (psql/uvicorn), но НЕ
      # публикуется на внешние интерфейсы хоста. Локально 5433/5434 заняты → 5435.
      - "127.0.0.1:${DB_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-termosphere} -d ${POSTGRES_DB:-termosphere}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: termosphere_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # внутри сети compose БД доступна как db:5432 (не 5435 — это только хостовый маппинг)
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-termosphere}:${POSTGRES_PASSWORD:-termosphere}@db:5432/${POSTGRES_DB:-termosphere}
    ports:
      # ТОЛЬКО 127.0.0.1: Swagger/API без basic-auth — наружу не выставляем
      # (публичный трафик идёт через web+nginx с basic-auth). Порт для отладки.
      - "127.0.0.1:${API_PORT:-8010}:8000"

  web:
    build: ./frontend
    container_name: termosphere_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      # ТОЛЬКО 127.0.0.1: за этот порт цепляется Cloudflare-туннель (он на хосте).
      # Наружу напрямую не публикуем — публичный доступ только через туннель.
      - "127.0.0.1:${WEB_PORT:-8090}:80"
    volumes:
      # basic-auth: htpasswd монтируется с хоста (в образ не пекётся, не в git)
      - ./deploy/htpasswd:/etc/nginx/.htpasswd:ro

  # --- Шаг 7: Metabase (BI-бонус). Профиль bi — по умолчанию НЕ поднимается
  #     (make up-full их не трогает). Поднимать через make bi-up. ---
  # Метаданные Metabase — в ОТДЕЛЬНОЙ БД (том mbdata), НЕ в CRM-томе pgdata.
  metabase_db:
    image: postgres:16-alpine
    container_name: termosphere_metabase_db
    profiles: ["bi"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MB_DB_USER:-metabase}
      POSTGRES_PASSWORD: ${MB_DB_PASSWORD:-metabase}
      POSTGRES_DB: ${MB_DB_NAME:-metabaseapp}
    volumes:
      - mbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MB_DB_USER:-metabase} -d ${MB_DB_NAME:-metabaseapp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  metabase:
    image: metabase/metabase:v0.62.3.5
    container_name: termosphere_metabase
    profiles: ["bi"]
    restart: unless-stopped
    depends_on:
      metabase_db:
        condition: service_healthy
    environment:
      # app-БД метаданных Metabase (отдельный контейнер metabase_db)
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase_db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${MB_DB_NAME:-metabaseapp}
      MB_DB_USER: ${MB_DB_USER:-metabase}
      MB_DB_PASS: ${MB_DB_PASSWORD:-metabase}
      JAVA_OPTS: -Xmx1g                    # кэп JVM-heap
      JAVA_TIMEZONE: Asia/Yekaterinburg    # данные в +05:00
    # Жёсткий потолок памяти контейнера — гарантия «не давить соседей» на общем
    # сервере: -Xmx1g кэпит только heap, а RSS с off-heap ~1.3–1.5 ГБ, поэтому
    # держим mem_limit с запасом над heap.
    mem_limit: 1536m
    ports:
      # только localhost: провижининг и админ-доступ в обход basic-auth
      - "127.0.0.1:${MB_DIRECT_PORT:-3010}:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # nginx-прокси с basic-auth перед Metabase — единственная публичная точка (за туннель).
  metabase_proxy:
    image: nginx:1.27-alpine
    container_name: termosphere_metabase_proxy
    profiles: ["bi"]
    restart: unless-stopped
    depends_on:
      metabase:
        condition: service_healthy   # ждём готовности Metabase — иначе окно 502 после bi-up
    ports:
      - "127.0.0.1:${MB_PROXY_PORT:-8091}:80"   # цель Cloudflare-туннеля (bi.dm312sv.online)
    volumes:
      - ./deploy/metabase.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/htpasswd:/etc/nginx/.htpasswd:ro

volumes:
  pgdata:
  mbdata:
