# Reverse-proxy перед Metabase: basic-auth (тот же deploy/htpasswd, что и дашборд)
# + проксирование на контейнер metabase:3000. Наружу за туннель публикуется только
# этот прокси (порт MB_PROXY_PORT на 127.0.0.1), сам Metabase публично не торчит.
server {
    listen 80;
    server_name _;

    # Тот же basic-auth, что и у витрины (один публичный логин на оба hostname).
    auth_basic "ТермоСфера BI — ограниченный доступ";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Metabase бывает медленным на тяжёлых запросах — поднимаем таймауты.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 32m;

    location / {
        proxy_pass http://metabase:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;   # снаружи всегда HTTPS (Cloudflare-туннель)

        # Websockets (Metabase использует их для части real-time функций).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
